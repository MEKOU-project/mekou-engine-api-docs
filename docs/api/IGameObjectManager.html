<!DOCTYPE HTML>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEKOU ENGINE - ObjectManager</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header class="neu-card">
            <h1 class="neon-text">IObjectManager</h1>
            <p>シーン内の全GameObjectの生成・破棄・階層構造を統括するマネージャー</p>
        </header>
        <main class="neu-card">
            <h2 class="neon-text">Properties</h2>
            <ul>
                <li><code>rootObjects: IGameObject[]</code><br>シーンのルートに存在するオブジェクトのリスト。</li>
            </ul>
            <h2 class="neon-text">Methods</h2>
            <h3 class="neon-text">createGameObject(name)</h3>
            <p>新しいゲームオブジェクトをインスタンス化します。</p>
            <h3 class="neon-text">addObject(obj) / removeObject(obj)</h3>
            <p>シーンへの追加、またはシーンからの安全な削除を行います。</p>
            <h3 class="neon-text">clearScene()</h3>
            <p>現在の全オブジェクトを破棄し、シーンを初期化します。</p>
        </main>
    </div>
    <script src="../../shader.js"></script>
</body>

</html>
